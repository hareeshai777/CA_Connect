<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" fill="none">
  <defs>
    <!-- Clip to letter shapes -->
    <clipPath id="letters-clip">
      <text x="18" y="118" font-family="Arial Black, Arial, sans-serif" font-size="120" font-weight="900" letter-spacing="-6">CA</text>
    </clipPath>
  </defs>

  <!-- Base CA in navy -->
  <text x="18" y="118" font-family="Arial Black, Arial, sans-serif" font-size="120" font-weight="900" fill="#1B3D6F" letter-spacing="-6">CA</text>

  <!-- Tricolor diagonal stripes clipped to letters -->
  <g clip-path="url(#letters-clip)">
    <!-- Saffron band -->
    <polygon points="120,0  175,0  95,180  40,180" fill="#FF7A00"/>
    <!-- White band -->
    <polygon points="175,0  210,0  130,180  95,180" fill="#FFFFFF"/>
    <!-- Green band -->
    <polygon points="210,0  248,0  168,180  130,180" fill="#138808"/>
  </g>

  <!-- INDIA text -->
  <text x="150" y="162" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1B3D6F" text-anchor="middle" letter-spacing="10">INDIA</text>
</svg>
