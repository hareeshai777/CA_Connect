<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <defs>
    <!-- Clip tricolor stripes to only the A letter region -->
    <clipPath id="a-clip">
      <!-- A letter shape (right portion of CA text) -->
      <text x="152" y="148"
        font-family="'Arial Black', 'Arial Bold', Arial, Helvetica, sans-serif"
        font-size="145" font-weight="900">A</text>
    </clipPath>
  </defs>

  <!-- ── C letter in navy ── -->
  <text x="8" y="148"
    font-family="'Arial Black', 'Arial Bold', Arial, Helvetica, sans-serif"
    font-size="145" font-weight="900"
    fill="#1B3D72">C</text>

  <!-- ── A letter base in navy ── -->
  <text x="152" y="148"
    font-family="'Arial Black', 'Arial Bold', Arial, Helvetica, sans-serif"
    font-size="145" font-weight="900"
    fill="#1B3D72">A</text>

  <!-- ── Tricolor diagonal stripe clipped to A ── -->
  <g clip-path="url(#a-clip)">
    <!-- Saffron / Orange band -->
    <polygon points="190,0  230,0  170,160  130,160" fill="#FF8C00"/>
    <!-- White band -->
    <polygon points="230,0  255,0  195,160  170,160" fill="#FFFFFF"/>
    <!-- Green band -->
    <polygon points="255,0  290,0  230,160  195,160" fill="#138808"/>
  </g>

  <!-- ── INDIA text ── -->
  <text x="160" y="188"
    font-family="Arial, Helvetica, sans-serif"
    font-size="21" font-weight="700"
    fill="#1B3D72" text-anchor="middle"
    letter-spacing="9">INDIA</text>
</svg>
